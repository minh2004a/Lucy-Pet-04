<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lucy Pet - Established & Trusted Pet Care Service</title>
        <!-- Favicon -->

        <link

            sizes="60x60"
            href="./assets/favicon/apple-icon-60x60.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="72x72"
            href="./assets/favicon/apple-icon-72x72.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="76x76"
            href="./assets/favicon/apple-icon-76x76.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="114x114"
            href="./assets/favicon/apple-icon-114x114.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="120x120"
            href="./assets/favicon/apple-icon-120x120.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="144x144"
            href="./assets/favicon/apple-icon-144x144.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="152x152"
            href="./assets/favicon/apple-icon-152x152.png"

        <link

            href="./assets/favicon/apple-icon-180x180.png"

        <link

            type="image/png"
            sizes="192x192"
            href="./assets/favicon/android-icon-192x192.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/favicon/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="96x96"
            href="./assets/favicon/favicon-96x96.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="./assets/favicon/favicon-16x16.png"
        />
        <link rel="manifest" href="./assets/favicon/manifest.json" />
        <meta name="msapplication-TileColor" content="#ffffff" />
        <meta
            name="msapplication-TileImage"
            content="./assets/favicon/ms-icon-144x144.png"
        />
        <meta name="theme-color" content="#ffffff" />
        <!-- Reset CSS -->
        <link rel="stylesheet" href="./assets/css/reset.css" />
        <!-- Nhúng Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Sora:wght@100..800&display=swap"
            rel="stylesheet"
        />
        <!-- Styles CSS  -->
        <link rel="stylesheet" href="./assets/css/styles.css" />
    </head>
    <body>
        <!-- Header -->
        <header class="header">
            <div class="container">
                <div class="header__inner">
                    <!-- Logo -->
                    <a href="#!" class="logo">
                        <img src="./assets/img/logo-lucy.svg" alt="Lucy Pet" />
                    </a>
                    <!-- Navigation -->
                    <nav>
                        <div class="navbar">
                            <ul class="nav__list">
                                <li class="nav__item">
                                    <a
                                        href="#!"
                                        class="nav__link active"
                                        data-text="Home"
                                        >Home</a
                                    >
                                </li>
                                <li class="nav__item">
                                    <a
                                        href="#!"
                                        class="nav__link"
                                        data-text="About"
                                        >About</a
                                    >
                                </li>
                                <li class="nav__item">
                                    <a
                                        href="#!"
                                        class="nav__link"
                                        data-text="Services & Rates"
                                    >
                                        Services & Rates
                                    </a>
                                </li>
                                <li class="nav__item">
                                    <a
                                        href="#!"
                                        class="nav__link"
                                        data-text="Reviews"
                                        >Reviews</a
                                    >
                                </li>
                                <li class="nav__item">
                                    <a
                                        href="#!"
                                        class="nav__link"
                                        data-text="Contacts us"
                                    >
                                        Contacts us
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </nav>
                    <!-- Header Action -->
                    <div class="header-action">
                        <a
                            href="#!"
                            class="header-action__link"
                            data-text="Sign in"
                            >Sign in</a
                        >
                        <a href="#!" class="btn header-action__btn">Sign up</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Hero -->
        <main>
            <section class="hero">
                <div class="container">
                    <div class="hero__inner">
                        <!-- Media -->
                        <div class="hero__media">
                            <div class="hero__media-wrap">
                                <img
                                    src="./assets/img/pet-01.png"
                                    alt=""
                                    class="hero__media-img"
                                />

                                <!-- Decor -->
                                <img
                                    src="./assets/img/decor-01.svg"
                                    alt=""
                                    class="hero__media-decor hero__media-left"
                                />
                                <img
                                    src="./assets/img/decor-02.svg"
                                    alt=""
                                    class="hero__media-decor hero__media-right"
                                />
                            </div>
                            <div
                                class="hero__media-wrap hero__media-wrap-small"
                            >
                                <img
                                    src="./assets/img/pet-02.png"
                                    alt=""
                                    class="hero__media-img hero__media-img-small"
                                />
                            </div>
                            <!-- Card -->
                            <div class="hero__card">
                                <!-- Card 1 -->
                                <div class="hero-card-item">
                                    <img
                                        src="./assets/img/pet-03.png"
                                        alt=""
                                        class="hero-card-item__thumb"
                                    />
                                    <div class="hero-card-item__info">
                                        <p class="hero-card-item__title">
                                            Pet health
                                        </p>
                                        <div
                                            class="hero-card-item__skeleton"
                                        ></div>
                                        <div
                                            class="hero-card-item__skeleton"
                                            style="--width: 39px"
                                        ></div>
                                    </div>
                                </div>
                                <span class="hero-card-item__separate"></span>
                                <!-- Card 2 -->
                                <div class="hero-card-item">
                                    <img
                                        src="./assets/img/pet-04.png"
                                        alt=""
                                        class="hero-card-item__thumb"
                                    />
                                    <div class="hero-card-item__info">
                                        <p class="hero-card-item__title">
                                            Pet care
                                        </p>
                                        <div
                                            class="hero-card-item__skeleton"
                                        ></div>
                                        <div
                                            class="hero-card-item__skeleton"
                                            style="--width: 39px"
                                        ></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Content -->
                        <div class="hero__content">
                            <div class="hero__content-wrap">
                                <h1 class="hero__heading">
                                    Established & Trusted Pet Care Service
                                </h1>
                                <p class="hero__desc">
                                    Discover a wide variety of Pawsitive
                                    services to choose from, including daycare,
                                    private walks, office duty and spa.
                                </p>
                                <div class="hero__row">
                                    <a
                                        href="#!"
                                        class="btn btn--primary hero__ctn-btn"
                                    >
                                        Book a Meet
                                        <span class="hero__icon">
                                            <svg
                                                width="4"
                                                height="6"
                                                viewBox="0 0 4 6"
                                                fill="none"
                                                xmlns="http://www.w3.org/2000/svg"
                                            >
                                                <path
                                                    d="M0.5 0.5L3 3L0.5 5.5"
                                                    stroke="#FD5056"
                                                    stroke-linecap="round"
                                                    stroke-linejoin="round"
                                                />
                                            </svg> </span
                                    ></a>

                                    <a href="#!" class="hero__ctn-link">
                                        Schedule a Call
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <script>
            const handleActiveNav = () => {
                const navLinks = document.querySelectorAll(".nav__link");
                navLinks.forEach((link) => {
                    link.addEventListener("click", () => {
                        navLinks.forEach((el) => {
                            el.classList.remove("active");
                        });
                        link.classList.add("active");
                    });
                });
            };
            handleActiveNav();
        </script>
    </body>
</html>
